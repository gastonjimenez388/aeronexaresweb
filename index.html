<style>
    .cosmos-engine {
        position: relative;
        width: 100%;
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px 0;
    }

    /* Contenedor del Mapa Estelar */
    .stellar-map {
        position: relative;
        width: 100%;
        max-width: 1200px;
        aspect-ratio: 16 / 9;
        background: url('aeronexares-planetario.jpg') no-repeat center center;
        background-size: contain;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 0 50px rgba(0, 0, 0, 1);
    }

    /* Puntos de Interacción (Trigger Zones) */
    .trigger-zone {
        position: absolute;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.4s ease;
        z-index: 10;
    }

    /* Ubicaciones exactas según la imagen */
    .trigger-lookapp { top: 43%; left: 37%; width: 12%; height: 22%; }
    .trigger-mapping { top: 32%; left: 56%; width: 14%; height: 25%; }
    .trigger-an1 { top: 22%; left: 77%; width: 11%; height: 20%; }

    /* Overlay del Logo (Se abre al tocar) */
    .logo-revelator {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.85);
        border: 2px solid #00d4ff;
        opacity: 0;
        transform: scale(0.5);
        transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
        pointer-events: none;
    }

    .trigger-zone:hover .logo-revelator,
    .trigger-zone.active .logo-revelator {
        opacity: 1;
        transform: scale(1.1);
    }

    .logo-revelator img {
        width: 70%;
        height: auto;
        filter: drop-shadow(0 0 10px #00d4ff);
    }

    /* Tooltip de Datos Técnicos */
    .data-ghost {
        position: absolute;
        bottom: -40px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        color: #ffaa00;
        white-space: nowrap;
        opacity: 0;
        transition: opacity 0.3s;
    }

    .trigger-zone:hover .data-ghost { opacity: 1; }

</style>

<section class="cosmos-engine">
    <div class="stellar-map">
        
        <div class="trigger-zone trigger-lookapp" onclick="this.classList.toggle('active')">
            <div class="logo-revelator">
                <img src="image_a4b28a.png" alt="LookApp Logo">
            </div>
            <div class="data-ghost">V: 35 | L: 1.0 | T: 0.8</div>
        </div>

        <div class="trigger-zone trigger-mapping" onclick="this.classList.toggle('active')">
            <div class="logo-revelator">
                <img src="Smart MappingLab.png" alt="Mapping Lab Logo">
            </div>
            <div class="data-ghost">V: 18 | L: 4.0 | T: 5.5</div>
        </div>

        <div class="trigger-zone trigger-an1">
            <div class="logo-revelator" style="border-color: #555;">
                <span class="text-[8px] text-white font-mono">NEURAL_CORE<br>LOCKED</span>
            </div>
            <div class="data-ghost">V: 8 | L: 20.0 | T: 60.0</div>
        </div>

    </div>
</section>
